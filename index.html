<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ageo Soft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var l = localStorage.getItem("lang") || (navigator.language.startsWith("ja") ? "ja" : "en");
      if (l === "ja") document.documentElement.classList.add("ja");
    })();
    function switchLang(lang) {
      localStorage.setItem("lang", lang);
      document.documentElement.classList.toggle("ja", lang === "ja");
    }
  </script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="logo.jpg" alt="Ageo Soft">
        <span>Ageo Soft</span>
      </a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
        <span></span>
      </label>
      <nav>
        <a href="index.html">Home</a>
        <a href="Azimuth%20Map%20for%20iOS.html">Azimuth Map (iOS)</a>
        <a href="Azimuth%20Map%20for%20Android.html">Azimuth Map (Android)</a>
        <a href="BMCalc.html">BMCalc</a>
        <a href="Music%20Browser%20for%20iOS.html">Music Browser</a>
        <a href="Contact%20Us.html">Contact Us</a>
      </nav>
    </div>
  </header>


  <main class="container">
    <h1 class="page-heading"><span class="lang-en">Our Apps</span><span class="lang-ja">アプリ一覧</span></h1>
    <div class="app-grid">
      <a href="Azimuth%20Map%20for%20iOS.html" class="app-card fade-in">
        <img src="Home/azimuth-map-ios.jpg" alt="Azimuth Map for iOS">
        <div class="card-title">Azimuth Map for iOS</div>
      </a>
      <a href="Azimuth%20Map%20for%20Android.html" class="app-card fade-in">
        <img src="Home/azimuth-map-android.jpg" alt="Azimuth Map for Android">
        <div class="card-title">Azimuth Map for Android</div>
      </a>
      <a href="BMCalc.html" class="app-card fade-in">
        <img src="Home/bmcalc.jpg" alt="BMCalc for Android / iOS">
        <div class="card-title">BMCalc for Android / iOS</div>
      </a>
      <a href="Music%20Browser%20for%20iOS.html" class="app-card fade-in">
        <img src="Home/music-browser.jpg" alt="Music Browser for iOS">
        <div class="card-title">Music Browser for iOS</div>
      </a>
    </div>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var observer = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.fade-in').forEach(function(el) {
        observer.observe(el);
      });
    });
  </script>

  <footer>
    <div class="container">
      <p>Copyright &copy; Ageo Soft All Rights Reserved.</p>
      <p class="lang-en"><a class="lang-link" onclick="switchLang('ja')">日本語</a></p>
      <p class="lang-ja"><a class="lang-link" onclick="switchLang('en')">English</a></p>
    </div>
  </footer>
</body>
</html>
