<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ageo Soft - Contact Us</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      var l = localStorage.getItem("lang") || (navigator.language.startsWith("ja") ? "ja" : "en");
      if (l === "ja") document.documentElement.classList.add("ja");
    })();
    function switchLang(lang) {
      localStorage.setItem("lang", lang);
      document.documentElement.classList.toggle("ja", lang === "ja");
    }
  </script>
</head>
<body>
  <header>
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <img src="logo.jpg" alt="Ageo Soft">
        <span>Ageo Soft</span>
      </a>
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label" aria-label="Toggle navigation">
        <span></span>
      </label>
      <nav>
        <a href="index.html">Home</a>
        <a href="Azimuth%20Map%20for%20iOS.html">Azimuth Map (iOS)</a>
        <a href="Azimuth%20Map%20for%20Android.html">Azimuth Map (Android)</a>
        <a href="BMCalc.html">BMCalc</a>
        <a href="Music%20Browser%20for%20iOS.html">Music Browser</a>
        <a href="Contact%20Us.html">Contact Us</a>
      </nav>
    </div>
  </header>


  <main class="container">
    <h1 class="page-heading"><span class="lang-en">Contact Us</span><span class="lang-ja">お問い合わせ</span></h1>
    <iframe
      class="contact-form"
      src="https://docs.google.com/forms/d/e/1FAIpQLSfP--uu50PhpdSkKy8Bp5ikAcsiSnb9Y_FHXVKfLv8cjoQ6UA/viewform?embedded=true"
      title="Support for Ageo Soft's Apps"
      loading="lazy">
      Loading…
    </iframe>
  </main>

  <footer>
    <div class="container">
      <p>Copyright &copy; Ageo Soft All Rights Reserved.</p>
      <p class="lang-en"><a class="lang-link" onclick="switchLang('ja')">日本語</a></p>
      <p class="lang-ja"><a class="lang-link" onclick="switchLang('en')">English</a></p>
    </div>
  </footer>
</body>
</html>
